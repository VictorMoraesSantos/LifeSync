name: CI/CD - Nutrition

on:
  push:
    branches: [main]
    paths:
      - "Services/Nutrition/**"
  pull_request:
    paths:
      - "Services/Nutrition/**"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore LifeSync.slnx

      - name: Build solution
        run: dotnet build LifeSync.slnx --configuration Release --no-restore

  docker_build_and_push:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/victormoraessantos/lifesync-nutritionapi
          tags: |
            type=sha,prefix=main-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Services/Nutrition/Nutrition.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker_build_and_push
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/lifesync
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            sed -i "s/^NUTRITION_TAG=.*/NUTRITION_TAG=main-${SHORT_SHA}/" .env
            docker compose -f docker-compose.apps.yml pull nutrition.api
            docker compose -f docker-compose.apps.yml up -d nutrition.api
