openapi: 3.0.3
info:
  title: Financial Service API
  description: API for managing personal financial transactions, categories, and recurrence schedules
  version: 1.0.0
  contact:
    name: LifeSync Support

servers:
  - url: /api
    description: Base API server

tags:
  - name: Transactions
    description: Transaction management endpoints
  - name: Categories
    description: Category management endpoints
  - name: Recurrence Schedules
    description: Recurring transaction schedule management

paths:
  /transactions:
    get:
      tags:
        - Transactions
      summary: List transactions with filters
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
          description: User ID to filter transactions
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TransactionType'
          description: Transaction type filter
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
          description: Category ID filter
        - name: fromDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date filter (inclusive)
        - name: toDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date filter (inclusive)
        - name: minAmount
          in: query
          required: false
          schema:
            type: number
            format: decimal
          description: Minimum amount filter
        - name: maxAmount
          in: query
          required: false
          schema:
            type: number
            format: decimal
          description: Maximum amount filter
        - name: paymentMethod
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentMethod'
          description: Payment method filter
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionDTO'
        '400':
          description: Invalid filter parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Transactions
      summary: Create a new transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionDTO'
            example:
              description: "Grocery shopping"
              amount: 150.50
              type: "expense"
              categoryId: 5
              paymentMethod: "pix"
              currency: "BRL"
              date: "2026-04-15"
              notes: "Weekly groceries"
              isRecurring: false
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDTO'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions/{id}:
    get:
      tags:
        - Transactions
      summary: Get transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDTO'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Transactions
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionDTO'
      responses:
        '200':
          description: Transaction updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDTO'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Transactions
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Transaction deleted successfully
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /categories:
    get:
      tags:
        - Categories
      summary: List categories with filters
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
          description: User ID to filter categories
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TransactionType'
          description: Category type filter
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDTO'
        '400':
          description: Invalid filter parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Categories
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryDTO'
            example:
              name: "Food & Dining"
              type: "expense"
              color: "#FF5733"
              icon: "restaurant"
              userId: 1
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDTO'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /categories/{id}:
    get:
      tags:
        - Categories
      summary: Get category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDTO'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Categories
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryDTO'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDTO'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Categories
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Category deleted successfully
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /recurrence-schedules:
    get:
      tags:
        - Recurrence Schedules
      summary: List recurrence schedules
      responses:
        '200':
          description: List of recurrence schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecurrenceScheduleDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Recurrence Schedules
      summary: Create a new recurrence schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecurrenceScheduleDTO'
            example:
              description: "Netflix subscription"
              amount: 55.90
              type: "expense"
              categoryId: 12
              paymentMethod: "credit_card"
              currency: "BRL"
              frequency: "monthly"
              startDate: "2026-01-01"
              endDate: "2026-12-31"
              dayOfMonth: 15
      responses:
        '201':
          description: Recurrence schedule created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurrenceScheduleDTO'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /recurrence-schedules/{id}:
    get:
      tags:
        - Recurrence Schedules
      summary: Get recurrence schedule by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Recurrence schedule details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurrenceScheduleDTO'
        '404':
          description: Recurrence schedule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Recurrence Schedules
      summary: Update a recurrence schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecurrenceScheduleDTO'
      responses:
        '200':
          description: Recurrence schedule updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurrenceScheduleDTO'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recurrence schedule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Recurrence Schedules
      summary: Delete a recurrence schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Recurrence schedule deleted successfully
        '404':
          description: Recurrence schedule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    TransactionType:
      type: string
      enum:
        - income
        - expense
      description: Type of transaction

    PaymentMethod:
      type: string
      enum:
        - cash
        - credit_card
        - debit_card
        - pix
        - bank_transfer
      description: Payment method used for the transaction

    Currency:
      type: string
      description: ISO 4217 currency code
      example: BRL
      pattern: '^[A-Z]{3}$'

    RecurrenceFrequency:
      type: string
      enum:
        - daily
        - weekly
        - monthly
        - yearly
      description: Frequency of recurrence

    Money:
      type: object
      properties:
        amount:
          type: number
          format: decimal
          example: 150.50
        currency:
          type: string
          example: BRL
      description: Money value object with amount and ISO 4217 currency code

    TransactionDTO:
      type: object
      properties:
        id:
          type: integer
          example: 1
        description:
          type: string
          example: "Grocery shopping"
        amount:
          type: number
          format: decimal
          example: 150.50
        type:
          $ref: '#/components/schemas/TransactionType'
        categoryId:
          type: integer
          example: 5
        categoryName:
          type: string
          example: "Food & Dining"
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        currency:
          type: string
          example: BRL
        date:
          type: string
          format: date
          example: "2026-04-15"
        notes:
          type: string
          nullable: true
          example: "Weekly groceries"
        isRecurring:
          type: boolean
          example: false
        recurrenceScheduleId:
          type: integer
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: "2026-04-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-15T10:30:00Z"

    CreateTransactionDTO:
      type: object
      required:
        - description
        - amount
        - type
        - categoryId
        - paymentMethod
        - currency
        - date
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 255
          example: "Grocery shopping"
        amount:
          type: number
          format: decimal
          minimum: 0.01
          example: 150.50
        type:
          $ref: '#/components/schemas/TransactionType'
        categoryId:
          type: integer
          example: 5
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        currency:
          type: string
          example: BRL
        date:
          type: string
          format: date
          example: "2026-04-15"
        notes:
          type: string
          nullable: true
          maxLength: 1000
          example: "Weekly groceries"
        isRecurring:
          type: boolean
          default: false
          example: false
        recurrenceScheduleId:
          type: integer
          nullable: true
          example: null

    UpdateTransactionDTO:
      type: object
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 255
          example: "Updated grocery shopping"
        amount:
          type: number
          format: decimal
          minimum: 0.01
          example: 175.00
        type:
          $ref: '#/components/schemas/TransactionType'
        categoryId:
          type: integer
          example: 5
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        currency:
          type: string
          example: BRL
        date:
          type: string
          format: date
          example: "2026-04-16"
        notes:
          type: string
          nullable: true
          maxLength: 1000
          example: "Updated weekly groceries"
        isRecurring:
          type: boolean
          example: false
        recurrenceScheduleId:
          type: integer
          nullable: true
          example: null

    TransactionFilterDTO:
      type: object
      properties:
        userId:
          type: integer
          required: true
          description: User ID to filter transactions
        type:
          $ref: '#/components/schemas/TransactionType'
        categoryId:
          type: integer
        fromDate:
          type: string
          format: date
        toDate:
          type: string
          format: date
        minAmount:
          type: number
          format: decimal
        maxAmount:
          type: number
          format: decimal
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'

    CategoryDTO:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Food & Dining"
        type:
          $ref: '#/components/schemas/TransactionType'
        color:
          type: string
          example: "#FF5733"
        icon:
          type: string
          example: "restaurant"
        userId:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    CreateCategoryDTO:
      type: object
      required:
        - name
        - type
        - color
        - icon
        - userId
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Food & Dining"
        type:
          $ref: '#/components/schemas/TransactionType'
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          example: "#FF5733"
        icon:
          type: string
          example: "restaurant"
        userId:
          type: integer
          example: 1

    UpdateCategoryDTO:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Dining & Restaurants"
        type:
          $ref: '#/components/schemas/TransactionType'
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          example: "#FF5734"
        icon:
          type: string
          example: "restaurant"

    CategoryFilterDTO:
      type: object
      properties:
        userId:
          type: integer
          required: true
          description: User ID to filter categories
        type:
          $ref: '#/components/schemas/TransactionType'

    RecurrenceScheduleDTO:
      type: object
      properties:
        id:
          type: integer
          example: 1
        description:
          type: string
          example: "Netflix subscription"
        amount:
          type: number
          format: decimal
          example: 55.90
        type:
          $ref: '#/components/schemas/TransactionType'
        categoryId:
          type: integer
          example: 12
        categoryName:
          type: string
          example: "Entertainment"
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        currency:
          type: string
          example: BRL
        frequency:
          $ref: '#/components/schemas/RecurrenceFrequency'
        startDate:
          type: string
          format: date
          example: "2026-01-01"
        endDate:
          type: string
          format: date
          nullable: true
          example: "2026-12-31"
        dayOfWeek:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
          description: Day of week (1=Monday, 7=Sunday) - used for weekly frequency
          example: null
        dayOfMonth:
          type: integer
          nullable: true
          minimum: 1
          maximum: 31
          description: Day of month - used for monthly/yearly frequency
          example: 15
        createdAt:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    CreateRecurrenceScheduleDTO:
      type: object
      required:
        - description
        - amount
        - type
        - categoryId
        - paymentMethod
        - currency
        - frequency
        - startDate
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 255
          example: "Netflix subscription"
        amount:
          type: number
          format: decimal
          minimum: 0.01
          example: 55.90
        type:
          $ref: '#/components/schemas/TransactionType'
        categoryId:
          type: integer
          example: 12
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        currency:
          type: string
          example: BRL
        frequency:
          $ref: '#/components/schemas/RecurrenceFrequency'
        startDate:
          type: string
          format: date
          example: "2026-01-01"
        endDate:
          type: string
          format: date
          nullable: true
          example: "2026-12-31"
        dayOfWeek:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
          description: Day of week (1=Monday, 7=Sunday) - required for weekly frequency
          example: null
        dayOfMonth:
          type: integer
          nullable: true
          minimum: 1
          maximum: 31
          description: Day of month - used for monthly/yearly frequency
          example: 15

    UpdateRecurrenceScheduleDTO:
      type: object
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 255
          example: "Updated Netflix subscription"
        amount:
          type: number
          format: decimal
          minimum: 0.01
          example: 59.90
        type:
          $ref: '#/components/schemas/TransactionType'
        categoryId:
          type: integer
          example: 12
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        currency:
          type: string
          example: BRL
        frequency:
          $ref: '#/components/schemas/RecurrenceFrequency'
        startDate:
          type: string
          format: date
          example: "2026-01-01"
        endDate:
          type: string
          format: date
          nullable: true
          example: "2027-12-31"
        dayOfWeek:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
          example: null
        dayOfMonth:
          type: integer
          nullable: true
          minimum: 1
          maximum: 31
          example: 15

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: "Invalid request parameters"
        error:
          type: string
          example: "Bad Request"
        timestamp:
          type: string
          format: date-time
          example: "2026-04-18T14:30:00Z"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
