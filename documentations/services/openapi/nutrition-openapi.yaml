openapi: 3.0.3
info:
  title: Nutrition Service API
  description: |
    API for managing nutrition tracking including foods, meals, diaries,
    liquid intake, and daily progress tracking.
  version: 1.0.0
  contact:
    name: LifeSync Support
  license:
    name: MIT

servers:
  - url: https://api.lifesync.app/nutrition
    description: Production server
  - url: https://staging-api.lifesync.app/nutrition
    description: Staging server
  - url: http://localhost:5000
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Foods
    description: Food management endpoints
  - name: Diaries
    description: Diary management endpoints
  - name: Meals
    description: Meal management endpoints
  - name: MealFoods
    description: Meal food association endpoints
  - name: Liquids
    description: Liquid intake tracking endpoints
  - name: LiquidTypes
    description: Liquid type management endpoints
  - name: DailyProgresses
    description: Daily progress tracking endpoints

paths:
  # ============ FOODS ============
  /api/foods:
    get:
      tags: [Foods]
      summary: List all foods
      description: Returns a paginated list of foods with optional filtering by name and category
      operationId: getFoods
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Filter by food name
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Foods]
      summary: Create a new food
      description: Creates a new food item with nutritional information per 100g
      operationId: createFood
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFoodRequest'
            example:
              name: "Chicken Breast"
              caloriesPer100g: 165
              proteinPer100g: 31
              carbsPer100g: 0
              fatPer100g: 3.6
              fiberPer100g: 0
              sugarPer100g: 0
              sodiumPer100g: 74
              category: "Protein"
              servingSize: 100
              unit: "g"
      responses:
        '201':
          description: Food created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/foods/{id}:
    get:
      tags: [Foods]
      summary: Get food by ID
      operationId: getFoodById
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Foods]
      summary: Update food
      operationId: updateFood
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFoodRequest'
      responses:
        '200':
          description: Food updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Foods]
      summary: Delete food
      operationId: deleteFood
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Food deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ DIARIES ============
  /api/diaries:
    get:
      tags: [Diaries]
      summary: List all diaries
      description: Returns a paginated list of diaries with optional filtering by userId, fromDate, and toDate
      operationId: getDiaries
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
          description: Filter by user ID
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
          description: Filter diaries from this date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
          description: Filter diaries up to this date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Diaries]
      summary: Create a new diary
      description: Creates a new diary entry for a specific user and date
      operationId: createDiary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDiaryRequest'
            example:
              userId: 1
              date: "2026-04-18"
      responses:
        '201':
          description: Diary created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/diaries/{id}:
    get:
      tags: [Diaries]
      summary: Get diary by ID
      operationId: getDiaryById
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Diaries]
      summary: Update diary
      operationId: updateDiary
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDiaryRequest'
      responses:
        '200':
          description: Diary updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Diaries]
      summary: Delete diary
      operationId: deleteDiary
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Diary deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ MEALS ============
  /api/meals:
    get:
      tags: [Meals]
      summary: List all meals
      description: Returns a paginated list of meals with optional filtering by diaryId and mealType
      operationId: getMeals
      parameters:
        - name: diaryId
          in: query
          schema:
            type: integer
          description: Filter by diary ID
        - name: mealType
          in: query
          schema:
            $ref: '#/components/schemas/MealType'
          description: Filter by meal type
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Meals]
      summary: Create a new meal
      description: Creates a new meal entry for a specific diary
      operationId: createMeal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMealRequest'
            example:
              diaryId: 1
              name: "Breakfast"
              mealType: "breakfast"
              time: "2026-04-18T08:30:00Z"
              notes: "Oatmeal with fruits"
      responses:
        '201':
          description: Meal created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/meals/{id}:
    get:
      tags: [Meals]
      summary: Get meal by ID
      operationId: getMealById
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Meals]
      summary: Update meal
      operationId: updateMeal
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMealRequest'
      responses:
        '200':
          description: Meal updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Meals]
      summary: Delete meal
      operationId: deleteMeal
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Meal deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ MEAL FOODS ============
  /api/meal-foods:
    get:
      tags: [MealFoods]
      summary: List all meal foods
      description: Returns a paginated list of meal foods with optional filtering by mealId
      operationId: getMealFoods
      parameters:
        - name: mealId
          in: query
          schema:
            type: integer
          description: Filter by meal ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealFoodResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [MealFoods]
      summary: Add food to meal
      description: Associates a food item with a meal and specifies the quantity
      operationId: addMealFood
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMealFoodRequest'
            example:
              mealId: 1
              foodId: 5
              quantity: 150
              unit: "g"
      responses:
        '201':
          description: Food added to meal successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/meal-foods/{id}:
    get:
      tags: [MealFoods]
      summary: Get meal food by ID
      operationId: getMealFoodById
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealFoodResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [MealFoods]
      summary: Update meal food
      operationId: updateMealFood
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMealFoodRequest'
      responses:
        '200':
          description: Meal food updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [MealFoods]
      summary: Remove food from meal
      operationId: removeMealFood
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Food removed from meal successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ LIQUIDS ============
  /api/liquids:
    get:
      tags: [Liquids]
      summary: List all liquid records
      description: Returns a paginated list of liquid intake records with optional filtering by diaryId
      operationId: getLiquids
      parameters:
        - name: diaryId
          in: query
          schema:
            type: integer
          description: Filter by diary ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Liquids]
      summary: Record liquid intake
      description: Records a liquid intake entry for a specific diary
      operationId: createLiquid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLiquidRequest'
            example:
              diaryId: 1
              liquidTypeId: 2
              quantity: 250
              unit: "ml"
      responses:
        '201':
          description: Liquid intake recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/liquids/{id}:
    get:
      tags: [Liquids]
      summary: Get liquid by ID
      operationId: getLiquidById
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Liquids]
      summary: Update liquid
      operationId: updateLiquid
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLiquidRequest'
      responses:
        '200':
          description: Liquid updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Liquids]
      summary: Delete liquid
      operationId: deleteLiquid
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Liquid deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ LIQUID TYPES ============
  /api/liquid-types:
    get:
      tags: [LiquidTypes]
      summary: List all liquid types
      description: Returns a paginated list of liquid types
      operationId: getLiquidTypes
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidTypeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [LiquidTypes]
      summary: Create a new liquid type
      description: Creates a new liquid type definition
      operationId: createLiquidType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLiquidTypeRequest'
            example:
              name: "Water"
              defaultUnit: "ml"
              caloriesPer100ml: 0
      responses:
        '201':
          description: Liquid type created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/liquid-types/{id}:
    get:
      tags: [LiquidTypes]
      summary: Get liquid type by ID
      operationId: getLiquidTypeById
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidTypeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [LiquidTypes]
      summary: Update liquid type
      operationId: updateLiquidType
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLiquidTypeRequest'
      responses:
        '200':
          description: Liquid type updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [LiquidTypes]
      summary: Delete liquid type
      operationId: deleteLiquidType
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Liquid type deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ DAILY PROGRESSES ============
  /api/daily-progresses:
    get:
      tags: [DailyProgresses]
      summary: List all daily progress
      description: Returns a paginated list of daily progress records with optional filtering by userId, fromDate, and toDate
      operationId: getDailyProgresses
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
          description: Filter by user ID
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
          description: Filter progress from this date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
          description: Filter progress up to this date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyProgressResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [DailyProgresses]
      summary: Create daily progress
      description: Creates a new daily progress record for tracking calories and liquids
      operationId: createDailyProgress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDailyProgressRequest'
            example:
              userId: 1
              date: "2026-04-18"
              weight: 75
              steps: 8000
              waterIntake: 2000
              caloriesConsumed: 1800
              caloriesGoal: 2000
              proteinGoal: 120
              carbsGoal: 200
              fatGoal: 65
      responses:
        '201':
          description: Daily progress created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/daily-progresses/{id}:
    get:
      tags: [DailyProgresses]
      summary: Get daily progress by ID
      operationId: getDailyProgressById
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyProgressResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [DailyProgresses]
      summary: Update daily progress
      operationId: updateDailyProgress
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDailyProgressRequest'
      responses:
        '200':
          description: Daily progress updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [DailyProgresses]
      summary: Delete daily progress
      operationId: deleteDailyProgress
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Daily progress deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
      description: Unique identifier of the resource

  schemas:
    # ============ ENUMS ============
    MealType:
      type: string
      enum:
        - breakfast
        - lunch
        - dinner
        - snack
      description: Type of meal

    Unit:
      type: string
      enum:
        - g
        - ml
        - oz
        - cup
        - tbsp
        - tsp
        - serving
      description: Measurement unit for food or liquid

    # ============ BASE SCHEMAS ============
    DTOBase:
      type: object
      properties:
        id:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    Pagination:
      type: object
      properties:
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalItems:
          type: integer
          format: int32
