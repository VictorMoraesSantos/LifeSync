    # ============ RESPONSE SCHEMAS ============
    CreateResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
          description: ID of the created resource

    SuccessResponse:
      type: object
      properties:
        isSuccess:
          type: boolean
          example: true

    Error:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        details:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "VALIDATION_ERROR"
            description: "Invalid request data"
            details:
              - "Name is required"
              - "Calories must be a positive number"

    Unauthorized:
      description: Unauthorized - missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "UNAUTHORIZED"
            description: "Invalid or expired authentication token"

    NotFound:
      description: Not found - resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "NOT_FOUND"
            description: "Resource with ID 5 not found"

    UnprocessableEntity:
      description: Unprocessable entity - business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "BUSINESS_RULE_VIOLATION"
            description: "Cannot delete resource with active dependencies"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "INTERNAL_ERROR"
            description: "An unexpected error occurred"
