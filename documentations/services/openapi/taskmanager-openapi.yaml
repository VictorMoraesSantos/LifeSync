openapi: 3.0.3
info:
  title: TaskManager Service API
  description: API for managing tasks and task labels
  version: 1.0.0
servers:
  - url: /api
    description: Base API path

paths:
  # ===================== TASK ITEMS =====================

  /tasks:
    get:
      tags:
        - TaskItems
      summary: List all tasks
      description: Retrieve a list of all tasks with optional filtering
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by user ID
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Status'
          description: Filter by status
        - name: priority
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Priority'
          description: Filter by priority
        - name: labelId
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by label ID
        - name: fromDueDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter tasks with due date greater than or equal to this date
        - name: toDueDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter tasks with due date less than or equal to this date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskItemDTO'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - TaskItems
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskItemCommand'
            example:
              title: Complete project report
              description: Finish the quarterly report for the finance department
              priority: High
              dueDate: '2026-04-25'
              userId: 1
              taskLabelsId: [1, 2]
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskItemResult'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}:
    get:
      tags:
        - TaskItems
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Task ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskItemDTO'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - TaskItems
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskItemCommand'
            example:
              title: Updated task title
              description: Updated task description
              status: InProgress
              priority: Urgent
              dueDate: '2026-04-30'
      responses:
        '200':
          description: Task updated successfully
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - TaskItems
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Task ID
      responses:
        '204':
          description: Task deleted successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/user/{userId}:
    get:
      tags:
        - TaskItems
      summary: Get tasks by user ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: User ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskItemDTO'
        '404':
          description: User not found or no tasks found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/search:
    get:
      tags:
        - TaskItems
      summary: Search tasks with filters and pagination
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by task ID
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by user ID
        - name: titleContains
          in: query
          required: false
          schema:
            type: string
          description: Filter tasks where title contains this string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Status'
          description: Filter by status
        - name: priority
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Priority'
          description: Filter by priority
        - name: dueDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter by due date
        - name: labelId
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by label ID
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
          description: Field to sort by
        - name: sortDesc
          in: query
          required: false
          schema:
            type: boolean
          description: Sort in descending order
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
          description: Page number
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: Successful response with paginated results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTaskItemsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/batch:
    post:
      tags:
        - TaskItems
      summary: Create multiple tasks in batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateTaskItemCommand'
            example:
              - title: Task 1
                description: Description for task 1
                priority: High
                dueDate: '2026-04-25'
                userId: 1
              - title: Task 2
                description: Description for task 2
                priority: Medium
                dueDate: '2026-04-26'
                userId: 1
      responses:
        '201':
          description: Tasks created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCreateResult'
        '207':
          description: Partial success - some tasks failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCreatePartialResult'
        '400':
          description: Bad request - all tasks failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}/addLabels:
    post:
      tags:
        - TaskItems
      summary: Add labels to a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddLabelCommand'
            example:
              taskLabelsId: [1, 2, 3]
      responses:
        '200':
          description: Labels added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddLabelResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}/removeLabels:
    post:
      tags:
        - TaskItems
      summary: Remove labels from a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveLabelCommand'
            example:
              taskLabelsId: [1, 2]
      responses:
        '200':
          description: Labels removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveLabelResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===================== TASK LABELS =====================

  /labels:
    get:
      tags:
        - TaskLabels
      summary: List all labels
      description: Retrieve a list of all labels with optional filtering
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by user ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskLabelDTO'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - TaskLabels
      summary: Create a new label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskLabelCommand'
            example:
              name: Work
              labelColor: Blue
              userId: 1
      responses:
        '201':
          description: Label created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskLabelResult'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /labels/{id}:
    get:
      tags:
        - TaskLabels
      summary: Get label by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Label ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskLabelDTO'
        '404':
          description: Label not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - TaskLabels
      summary: Update a label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Label ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskLabelCommand'
            example:
              name: Personal
              labelColor: Green
      responses:
        '200':
          description: Label updated successfully
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Label not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - TaskLabels
      summary: Delete a label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Label ID
      responses:
        '204':
          description: Label deleted successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Label not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /labels/user/{userId}:
    get:
      tags:
        - TaskLabels
      summary: Get labels by user ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: User ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskLabelDTO'
        '404':
          description: User not found or no labels found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /labels/search:
    get:
      tags:
        - TaskLabels
      summary: Search labels with filters and pagination
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by label ID
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by user ID
        - name: itemId
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Filter by item ID
        - name: nameContains
          in: query
          required: false
          schema:
            type: string
          description: Filter labels where name contains this string
        - name: labelColor
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LabelColor'
          description: Filter by label color
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
          description: Field to sort by
        - name: sortDesc
          in: query
          required: false
          schema:
            type: boolean
          description: Sort in descending order
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
          description: Page number
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: Successful response with paginated results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTaskLabelsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /labels/batch:
    post:
      tags:
        - TaskLabels
      summary: Create multiple labels in batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateTaskLabelCommand'
            example:
              - name: Work
                labelColor: Blue
                userId: 1
              - name: Personal
                labelColor: Green
                userId: 1
      responses:
        '201':
          description: Labels created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCreateResult'
        '207':
          description: Partial success - some labels failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCreatePartialResult'
        '400':
          description: Bad request - all labels failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# =============================================================================
# COMPONENTS
# =============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ===================== ENUMS =====================

  schemas:
    Status:
      type: string
      enum:
        - Pending
        - InProgress
        - Completed
        - Cancelled
      description: |
        Task status:
        - Pending: Task is waiting to be started
        - InProgress: Task is currently being worked on
        - Completed: Task has been finished
        - Cancelled: Task has been cancelled

    Priority:
      type: string
      enum:
        - Low
        - Medium
        - High
        - Urgent
      description: |
        Task priority level:
        - Low: Low priority task
        - Medium: Medium priority task
        - High: High priority task
        - Urgent: Urgent task requiring immediate attention

    LabelColor:
      type: string
      enum:
        - Red
        - Green
        - Blue
        - Yellow
        - Purple
        - Orange
        - Pink
        - Brown
        - Gray
      description: |
        Label color options (hex values):
        - Red: #FF0000
        - Green: #00FF00
        - Blue: #0000FF
        - Yellow: #FFFF00
        - Purple: #800080
        - Orange: #FFA500
        - Pink: #FFC0CB
        - Brown: #A52A2A
        - Gray: #808080

    # ===================== TASK ITEM SCHEMAS =====================

    CreateTaskItemCommand:
      type: object
      required:
        - title
        - description
        - priority
        - dueDate
        - userId
      properties:
        title:
          type: string
          maxLength: 200
          example: Complete project report
        description:
          type: string
          example: Finish the quarterly report for the finance department
        priority:
          $ref: '#/components/schemas/Priority'
        dueDate:
          type: string
          format: date
          example: '2026-04-25'
        userId:
          type: integer
          format: int32
          example: 1
        taskLabelsId:
          type: array
          items:
            type: integer
            format: int32
          example: [1, 2]
          description: Optional list of label IDs to associate with the task

    UpdateTaskItemCommand:
      type: object
      required:
        - title
        - description
        - status
        - priority
        - dueDate
      properties:
        title:
          type: string
          maxLength: 200
          example: Updated task title
        description:
          type: string
          example: Updated task description
        status:
          $ref: '#/components/schemas/Status'
        priority:
          $ref: '#/components/schemas/Priority'
        dueDate:
          type: string
          format: date
          example: '2026-04-30'

    AddLabelCommand:
      type: object
      required:
        - taskLabelsId
      properties:
        taskLabelsId:
          type: array
          items:
            type: integer
            format: int32
          example: [1, 2, 3]

    RemoveLabelCommand:
      type: object
      required:
        - taskLabelsId
      properties:
        taskLabelsId:
          type: array
          items:
            type: integer
            format: int32
          example: [1, 2]

    AddLabelResult:
      type: object
      properties:
        isSuccess:
          type: boolean
          example: true

    RemoveLabelResult:
      type: object
      properties:
        isSuccess:
          type: boolean
          example: true

    CreateTaskItemResult:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 123

    TaskItemDTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 1
        createdAt:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-04-18T14:45:00Z'
        title:
          type: string
          example: Complete project report
        description:
          type: string
          example: Finish the quarterly report for the finance department
        status:
          $ref: '#/components/schemas/Status'
        priority:
          $ref: '#/components/schemas/Priority'
        dueDate:
          type: string
          format: date
          example: '2026-04-25'
        userId:
          type: integer
          format: int32
          example: 1
        labels:
          type: array
          items:
            $ref: '#/components/schemas/TaskLabelDTO'
          example:
            - id: 1
              name: Work
              labelColor: Blue
              userId: 1
            - id: 2
              name: Important
              labelColor: Red
              userId: 1

    # ===================== TASK LABEL SCHEMAS =====================

    CreateTaskLabelCommand:
      type: object
      required:
        - name
        - labelColor
        - userId
      properties:
        name:
          type: string
          maxLength: 100
          example: Work
        labelColor:
          $ref: '#/components/schemas/LabelColor'
        userId:
          type: integer
          format: int32
          example: 1

    UpdateTaskLabelCommand:
      type: object
      required:
        - name
        - labelColor
      properties:
        name:
          type: string
          maxLength: 100
          example: Personal
        labelColor:
          $ref: '#/components/schemas/LabelColor'

    CreateTaskLabelResult:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 123

    TaskLabelDTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 1
        createdAt:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-04-18T14:45:00Z'
        name:
          type: string
          example: Work
        labelColor:
          $ref: '#/components/schemas/LabelColor'
        userId:
          type: integer
          format: int32
          example: 1

    # ===================== PAGINATION SCHEMAS =====================

    PaginatedTaskItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskItemDTO'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PaginatedTaskLabelsResponse:
      type: object
      properties:
        taskLabels:
          type: array
          items:
            $ref: '#/components/schemas/TaskLabelDTO'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      properties:
        totalItems:
          type: integer
          format: int32
          example: 100
        page:
          type: integer
          format: int32
          example: 1
        pageSize:
          type: integer
          format: int32
          example: 10
        totalPages:
          type: integer
          format: int32
          example: 10

    # ===================== BATCH SCHEMAS =====================

    BatchCreateResult:
      type: object
      properties:
        count:
          type: integer
          format: int32
          description: Number of successfully created items
          example: 5

    BatchCreatePartialResult:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
          example:
            - Validation failed for item 2: Title is required
            - Validation failed for item 4: Invalid due date

    # ===================== ERROR SCHEMA =====================

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Error message
        errors:
          type: array
          items:
            type: string
          example:
            - Validation error 1
            - Validation error 2
